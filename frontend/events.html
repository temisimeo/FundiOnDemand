<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>PWA | Add Event</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Mobile Sidebar Logic matched with Dashboard */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -250px; /* Hide by default on mobile */
                z-index: 1050;
                height: 100vh;
                transition: 0.3s;
            }
            .sidebar.active {
                left: 0;
            }
            .nav-link span {
                display: inline !important; 
            }
        }

        /* Consistent layout spacing */
        .main-content {
            min-height: calc(100vh - 65px);
            background-color: #f8f9fa;
        }

        .cursor-pointer { cursor: pointer; }
        
        /* Card enhancement */
        .card {
            border: none;
            border-radius: 10px;
        }
        .card-header {
            border-radius: 10px 10px 0 0 !important;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="container-fluid p-0 d-flex">
    <nav class="sidebar d-flex flex-column shadow bg-dark text-white" id="sidebar" style="width: 250px; min-width: 250px;">
        <div class="sidebar-logo p-4 text-center">
            <img src="icons/logo.jpg" alt="Logo" width="65" class="mb-2" style="border-radius: 6px;">
            <h6 class="text-white m-0 ls-wide small">MUST EVENT & CONFERENCE</h6>
        </div>
        
        <ul class="nav flex-column mb-auto px-2">
            <li class="nav-item">
                <a class="nav-link text-white-50" href="index.html"><i class="bi bi-house-door me-2"></i> <span>Dashboard</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link active text-white" href="events.html"><i class="bi bi-plus-circle me-2"></i> <span>Add Event</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white-50" href="view-events.html"><i class="bi bi-calendar-event me-2"></i> <span>Events</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white-50" href="users.html"><i class="bi bi-people me-2"></i> <span>Users</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white-50" href="#"><i class="bi bi-gear me-2"></i> <span>Settings</span></a>
            </li>
        </ul>

        <div class="logout-section border-top border-secondary">
            <a class="nav-link p-3 text-white-50" href="javascript:void(0)" onclick="localStorage.clear(); window.location.href='login.html';">
                <i class="bi bi-box-arrow-left me-2"></i> Logout
            </a>
        </div>
    </nav>

    <div class="flex-grow-1 d-flex flex-column" style="overflow-x: hidden;">
        <header class="top-header d-flex justify-content-between align-items-center px-4 py-3 bg-primary shadow-sm">
            <div class="d-flex align-items-center">
                <button class="btn btn-primary d-md-none me-2" id="sidebarToggle">
                    <i class="bi bi-list fs-4"></i>
                </button>
                <h5 class="m-0 text-white fw-light">Add Event</h5>
            </div>
            <div class="header-icons text-white">
                <i class="bi bi-bell me-3 cursor-pointer"></i>
                <i class="bi bi-person-circle cursor-pointer"></i>
            </div>
        </header>

        <main class="main-content p-3 p-md-4 d-flex flex-column">
            <div class="row g-4">
                <div class="col-12 col-lg-8 mx-auto">
                    <div class="card bg-white shadow-sm">
                        <div class="card-header bg-primary text-white py-3">
                            <i class="bi bi-plus-circle me-2"></i>CREATE NEW EVENT & CONFERENCE
                        </div>
                        <div class="card-body p-4">
                            <form id="addEventForm">
                                <div class="mb-3">
                                    <label for="heading" class="form-label fw-bold">Event Heading</label>
                                    <input type="text" class="form-control form-control-lg fs-6" id="heading" placeholder="Enter event title" required>
                                </div>
                                <div class="mb-3">
                                    <label for="description" class="form-label fw-bold">Description</label>
                                    <textarea class="form-control" id="description" placeholder="Provide event details..." rows="4" required></textarea>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="date" class="form-label fw-bold">Event Date</label>
                                        <input type="date" class="form-control" id="date" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="place" class="form-label fw-bold">Place / Venue</label>
                                        <input type="text" class="form-control" id="place" placeholder="e.g. Conference Hall A" required>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label for="presenter_name" class="form-label fw-bold">Presenter Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                        <input type="text" class="form-control" id="presenter_name" placeholder="Full name of presenter" required>
                                    </div>
                                </div>
                                <div class="d-grid">
                                    <button type="button" class="btn btn-primary btn-lg shadow-sm" onclick="addEvent()">
                                        <i class="bi bi-check-circle me-2"></i>Publish Event
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            
            <footer class="text-center mt-auto py-3 text-muted small">
                © 2026 MUST Conference System
            </footer>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Sidebar Toggle Logic for Mobile (matched with Dashboard)
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('sidebarToggle');

    toggleBtn.addEventListener('click', (e) => {
        sidebar.classList.toggle('active');
        e.stopPropagation();
    });

    document.addEventListener('click', (e) => {
        if (window.innerWidth < 768 && sidebar.classList.contains('active')) {
            if (!sidebar.contains(e.target) && e.target !== toggleBtn) {
                sidebar.classList.remove('active');
            }
        }
    });

    // Add Event Function
    async function addEvent(){
        const heading = document.getElementById("heading").value;
        const description = document.getElementById("description").value;
        const date = document.getElementById("date").value;
        const place = document.getElementById("place").value;
        const presenter_name = document.getElementById("presenter_name").value;

        // Basic validation
        if(!heading || !description || !date || !place || !presenter_name) {
            alert("Please fill in all fields.");
            return;
        }

        try {
            const res = await fetch("../backend/add_event.php", {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({heading, description, date, place, presenter_name})
            });
            const data = await res.json();
            alert(data.message);
            if(data.status === "success") {
                document.getElementById("addEventForm").reset();
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Failed to connect to the server.");
        }
    }
</script>
</body>
</html>
