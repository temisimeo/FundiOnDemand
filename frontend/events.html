<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>PWA | Add Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container-fluid p-0 d-flex">
    <nav class="sidebar d-flex flex-column shadow">
        <div class="sidebar-logo p-4 text-center">
            <img src="icons/logo.jpg" alt="Logo" width="65" class="mb-2" style="border-radius: 6px;">
            <h6 class="text-white m-0 ls-wide">MUST EVENT & CONFERENCE</h6>
        </div>
        
        <ul class="nav flex-column mb-auto">
            <li class="nav-item">
                <a class="nav-link" href="index.html"><i class="bi bi-house-door"></i> <span class="d-none d-md-inline">Dashboard</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="events.html"><i class="bi bi-plus-circle"></i> <span class="d-none d-md-inline">Add Event</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="view-events.html"><i class="bi bi-calendar-event"></i> <span class="d-none d-md-inline">Events</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="users.html"><i class="bi bi-people"></i> <span class="d-none d-md-inline">Users</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#"><i class="bi bi-gear"></i> <span class="d-none d-md-inline">Settings</span></a>
            </li>
        </ul>

        <div class="logout-section border-top border-secondary">
            <a class="nav-link p-3 text-white-50" href="login.html">
                <i class="bi bi-box-arrow-left"></i> Logout
            </a>
        </div>
    </nav>

    <div class="flex-grow-1 d-flex flex-column">
        <header class="top-header d-flex justify-content-between align-items-center px-4">
            <h5 class="m-0 text-white fw-light">Add Event</h5>
            <div class="header-icons text-white">
                <i class="bi bi-bell me-3 cursor-pointer"></i>
                <i class="bi bi-person-circle cursor-pointer"></i>
            </div>
        </header>

        <main class="main-content p-4 d-flex flex-column">
            <div class="row g-4">
                <div class="col-md-8 mx-auto">
                    <div class="card bg-white shadow-sm">
                        <div class="card-header bg-primary text-white">
                            <i class="bi bi-plus-circle me-2"></i>CREATE NEW EVENT AND CONFERENCE
                        </div>
                        <div class="card-body">
                            <form>
                                <div class="mb-3">
                                    <label for="heading" class="form-label">Event Heading</label>
                                    <input type="text" class="form-control" id="heading" placeholder="Event Heading" required>
                                </div>
                                <div class="mb-3">
                                    <label for="description" class="form-label">Description</label>
                                    <textarea class="form-control" id="description" placeholder="Description" rows="4" required></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="date" class="form-label">Event Date</label>
                                    <input type="date" class="form-control" id="date" required>
                                </div>
                                <div class="mb-3">
                                    <label for="place" class="form-label">Place</label>
                                    <input type="text" class="form-control" id="place" placeholder="Place" required>
                                </div>
                                <div class="mb-3">
                                    <label for="presenter_name" class="form-label">Presenter Name</label>
                                    <input type="text" class="form-control" id="presenter_name" placeholder="Presenter Name" required>
                                </div>
                                <div class="d-grid gap-2">
                                    <button type="button" class="btn btn-primary btn-lg" onclick="addEvent()">
                                        <i class="bi bi-check-circle me-2"></i>Add Event
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            
            <footer class="text-center mt-auto text-muted small">
                © 2026 MUST Conference System
            </footer>
        </main>
    </div>
</div>

<script>
async function addEvent(){
    const heading = document.getElementById("heading").value;
    const description = document.getElementById("description").value;
    const date = document.getElementById("date").value;
    const place = document.getElementById("place").value;
    const presenter_name = document.getElementById("presenter_name").value;

    const res = await fetch("../backend/add_event.php", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({heading,description,date,place,presenter_name})
    });
    const data = await res.json();
    alert(data.message);
}
</script>
<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
