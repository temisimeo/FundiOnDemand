<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA | Dashboard</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Mobile Sidebar Logic */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -250px; /* Hide by default on mobile */
                z-index: 1050;
                height: 100vh;
                transition: 0.3s;
            }
            .sidebar.active {
                left: 0;
            }
            .nav-link span {
                display: inline !important; /* Force text to show on mobile when open */
            }
        }

        /* Prevent content from hiding behind header */
        .main-content {
            min-height: calc(100vh - 60px);
        }

        .cursor-pointer { cursor: pointer; }
    </style>
</head>
<body>

<div class="container-fluid p-0 d-flex">
    <nav class="sidebar d-flex flex-column shadow bg-dark text-white" id="sidebar" style="width: 250px; min-width: 250px;">
        <div class="sidebar-logo p-4 text-center">
            <img src="icons/logo.jpg" alt="Logo" width="65" class="mb-2" style="border-radius: 6px;">
            <h6 class="text-white m-0 ls-wide small">MUST EVENT & CONFERENCE</h6>
        </div>
        
        <ul class="nav flex-column mb-auto px-2">
            <li class="nav-item">
                <a class="nav-link active text-white" href="index.html"><i class="bi bi-house-door me-2"></i> <span>Dashboard</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white-50" href="events.html"><i class="bi bi-plus-circle me-2"></i> <span>Add Event</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white-50" href="view-events.html"><i class="bi bi-calendar-event me-2"></i> <span>Events</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white-50" href="users.html"><i class="bi bi-people me-2"></i> <span>Users</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white-50" href="#"><i class="bi bi-gear me-2"></i> <span>Settings</span></a>
            </li>
        </ul>

        <div class="logout-section border-top border-secondary">
            <a class="nav-link p-3 text-white-50" href="javascript:void(0)" onclick="localStorage.clear(); window.location.href='login.html';">
                <i class="bi bi-box-arrow-left me-2"></i> Logout
            </a>
        </div>
    </nav>

    <div class="flex-grow-1 d-flex flex-column" style="overflow-x: hidden;">
        <header class="top-header d-flex justify-content-between align-items-center px-4 py-3 bg-primary shadow-sm">
            <div class="d-flex align-items-center">
                <button class="btn btn-primary d-md-none me-2" id="sidebarToggle">
                    <i class="bi bi-list fs-4"></i>
                </button>
                <h5 class="m-0 text-white fw-light">Dashboard</h5>
            </div>
            <div class="header-icons text-white">
                <i class="bi bi-bell me-3 cursor-pointer"></i>
                <i class="bi bi-person-circle cursor-pointer"></i>
            </div>
        </header>

        <main class="main-content p-3 p-md-4 d-flex flex-column">
            <div class="row g-3 g-md-4 mb-4">
                <div class="col-12 col-sm-6 col-lg-4">
                    <div class="card bg-white shadow-sm h-100 border-0">
                        <div class="card-header bg-primary text-white border-0">
                            <i class="bi bi-images me-2"></i>Gallery
                        </div>
                        <div class="card-body text-center py-4">
                            <i class="bi bi-image-alt" style="font-size: 2.5rem; color: #dee2e6;"></i>
                            <p class="card-text text-muted mt-3 small">View event photos and gallery</p>
                        </div>
                        <div class="card-footer bg-light text-center border-0">
                            <a href="add-picture.html" class="btn btn-sm btn-primary w-100">View Gallery</a>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-lg-4">
                    <div class="card bg-white shadow-sm h-100 border-0">
                        <div class="card-header bg-success text-white border-0">
                            <i class="bi bi-newspaper me-2"></i>News
                        </div>
                        <div class="card-body text-center py-4">
                            <i class="bi bi-newspaper" style="font-size: 2.5rem; color: #dee2e6;"></i>
                            <p class="card-text text-muted mt-3 small">Latest updates from conferences</p>
                        </div>
                        <div class="card-footer bg-light text-center border-0">
                            <a href="view-events.html" class="btn btn-sm btn-success w-100">Read News</a>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-sm-12 col-lg-4">
                    <div class="card bg-white shadow-sm h-100 border-0">
                        <div class="card-header bg-warning text-dark border-0">
                            <i class="bi bi-award me-2"></i>Awards
                        </div>
                        <div class="card-body text-center py-4">
                            <i class="bi bi-trophy" style="font-size: 2.5rem; color: #dee2e6;"></i>
                            <p class="card-text text-muted mt-3 small">Recognition from events</p>
                        </div>
                        <div class="card-footer bg-light text-center border-0">
                            <a href="#" class="btn btn-sm btn-warning w-100">View Awards</a>
                        </div>
                    </div>
                </div>
            </div>
            
            <footer class="text-center mt-auto py-3 text-muted small">
                © 2026 MUST Conference System
            </footer>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Sidebar Toggle Logic for Mobile
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('sidebarToggle');

    toggleBtn.addEventListener('click', (e) => {
        sidebar.classList.toggle('active');
        e.stopPropagation();
    });

    // Close sidebar when clicking outside on mobile
    document.addEventListener('click', (e) => {
        if (window.innerWidth < 768 && sidebar.classList.contains('active')) {
            if (!sidebar.contains(e.target) && e.target !== toggleBtn) {
                sidebar.classList.remove('active');
            }
        }
    });

    // Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js')
                .catch(err => console.error('SW Registration failed:', err));
        });
    }
</script>
</body>
</html>
