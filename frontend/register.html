<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUST Event Register</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h2>Register</h2>
      <input type="text" id="username" placeholder="Enter Username" required>
      <input type="email" id="email" placeholder="Enter Email" required>
      <input type="password" id="password" placeholder="Enter Password" required>
      <button class="btn-register" onclick="registerUser()">Register</button>
      <button class="btn-login" onclick="window.location.href='login.html'">Back to Login</button>
      <p class="footer-text">© 2026 MUST Conference System</p>
    </div>
  </div>

  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('SW registered on Register page'))
          .catch(err => console.log('SW failed', err));
      });
    }

    async function registerUser() {
      const username = document.getElementById("username").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (!username || !email || !password) {
        alert("Please fill in all fields");
        return;
      }

      try {
        const res = await fetch("../backend/register.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, email, password })
        });

        const data = await res.json();
        alert(data.message);
        
        if (res.ok) {
          window.location.href = "login.html";
        }
      } catch (error) {
        console.error("Error:", error);
        alert("Could not connect to the server.");
      }
    }
  </script>
</body>
</html>
