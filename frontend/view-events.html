<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>PWA | Events Management</title>
    
    <script>
        (function() {
            const user = JSON.parse(localStorage.getItem("user"));
            if (!user) window.location.href = "login.html";
        })();
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Mobile Sidebar Styling */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -250px;
                z-index: 1050;
                height: 100vh;
                transition: 0.3s;
                width: 250px;
            }
            .sidebar.active {
                left: 0;
            }
            .main-content {
                padding: 15px !important;
            }
            /* Stack the date badge on top for mobile */
            .event-card .row.g-0 {
                flex-direction: column;
            }
            .event-card .col-auto {
                width: 100%;
                flex-direction: row !important;
                justify-content: start !important;
                padding: 10px 20px !important;
            }
            .event-card .col-auto h4 {
                margin-right: 10px !important;
            }
        }

        .text-truncate-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .event-card {
            transition: transform 0.2s;
            border-radius: 12px;
        }
        .event-card:hover {
            transform: translateY(-2px);
        }
        .cursor-pointer { cursor: pointer; }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid p-0 d-flex">
    <nav class="sidebar d-flex flex-column shadow bg-dark" id="sidebar">
        <div class="sidebar-logo p-4 text-center">
            <img src="icons/logo.jpg" alt="Logo" width="55" class="mb-2" style="border-radius: 6px;">
            <h6 class="text-white m-0 small ls-wide">MUST EVENT & CONFERENCE</h6>
        </div>
        
        <ul class="nav flex-column mb-auto px-2">
            <li class="nav-item">
                <a class="nav-link  text-white" href="index.html"><i class="bi bi-house-door me-2"></i> <span>Dashboard</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white-50" href="events.html"><i class="bi bi-plus-circle me-2"></i> <span>Add Event</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link active text-white-50" href="view-events.html"><i class="bi bi-calendar-event me-2"></i> <span>Events</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white-50" href="users.html"><i class="bi bi-people me-2"></i> <span>Users</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white-50" href="#"><i class="bi bi-gear me-2"></i> <span>Settings</span></a>
            </li>
        </ul>

        <div class="logout-section border-top border-secondary">
            <a class="nav-link p-3 text-white-50" href="javascript:void(0)" onclick="localStorage.clear(); window.location.href='login.html';">
                <i class="bi bi-box-arrow-left"></i> Logout
            </a>
        </div>
    </nav>

    <div class="flex-grow-1 d-flex flex-column" style="min-width: 0;">
        <header class="top-header d-flex justify-content-between align-items-center px-3 px-md-4 shadow-sm bg-primary text-white" style="height: 60px;">
            <div class="d-flex align-items-center">
                <button class="btn btn-primary d-md-none me-2" id="sidebarToggle">
                    <i class="bi bi-list fs-3"></i>
                </button>
                <h5 class="m-0 fw-light">Management</h5>
            </div>
            <div class="header-icons">
                <i class="bi bi-bell me-3 cursor-pointer"></i>
                <i class="bi bi-person-circle cursor-pointer"></i>
            </div>
        </header>

        <main class="main-content p-3 p-md-4">
            <div class="container-fluid">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4">
                    <div class="mb-3 mb-md-0">
                        <h3 class="fw-bold mb-0">Scheduled Events</h3>
                        <p class="text-muted small">Review and manage conference schedules</p>
                    </div>
                    <button class="btn btn-primary shadow-sm" onclick="loadEvents()">
                        <i class="bi bi-arrow-clockwise me-1"></i> Refresh
                    </button>
                </div>

                <div id="eventList" class="row g-3">
                    <div class="text-center p-5">
                        <div class="spinner-border text-primary" role="status"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<div class="modal fade" id="editEventModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Edit Event</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="editEventForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Event Heading</label>
                        <input type="text" class="form-control" id="editHeading" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Description</label>
                        <textarea class="form-control" id="editDescription" rows="3"></textarea>
                    </div>
                    <div class="row g-2">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold small">Presenter</label>
                            <input type="text" class="form-control" id="editPresenter" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold small">Date</label>
                            <input type="date" class="form-control" id="editDate" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Location</label>
                        <input type="text" class="form-control" id="editPlace" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary px-4" onclick="updateEvent()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Sidebar Toggle functionality
const sidebar = document.getElementById('sidebar');
const toggleBtn = document.getElementById('sidebarToggle');

if(toggleBtn) {
    toggleBtn.addEventListener('click', () => {
        sidebar.classList.toggle('active');
    });
}

// Close sidebar when clicking outside on mobile
document.addEventListener('click', (e) => {
    if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !toggleBtn.contains(e.target)) {
        sidebar.classList.remove('active');
    }
});

let currentEditingEventId = null;
const editModal = new bootstrap.Modal(document.getElementById('editEventModal'));

async function loadEvents(){
    const list = document.getElementById("eventList");
    try {
        const res = await fetch("../backend/get_events.php");
        const events = await res.json();
        list.innerHTML = "";

        if(events.length === 0) {
            list.innerHTML = `<div class="col-12 text-center text-muted p-5">No events found.</div>`;
            return;
        }

        events.sort((a, b) => new Date(a.date) - new Date(b.date));

        events.forEach(e => {
            const eventDate = new Date(e.date);
            const isPast = eventDate < new Date().setHours(0,0,0,0);
            
            const card = document.createElement("div");
            card.className = "col-12";
            card.innerHTML = `
                <div class="card border-0 shadow-sm mb-3 overflow-hidden event-card">
                    <div class="card-body p-0">
                        <div class="row g-0">
                            <div class="col-auto bg-primary text-white p-3 d-flex flex-column align-items-center justify-content-center" style="min-width: 90px;">
                                <h4 class="m-0 fw-bold">${eventDate.getDate()}</h4>
                                <small class="text-uppercase" style="font-size: 0.7rem;">${eventDate.toLocaleString('default', { month: 'short' })}</small>
                            </div>
                            <div class="col p-3">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h6 class="text-primary fw-bold m-0">${e.heading}</h6>
                                    <span class="badge rounded-pill ${isPast ? 'bg-secondary' : 'bg-success-subtle text-success'}" style="font-size: 0.65rem;">
                                        ${isPast ? 'Past' : 'Upcoming'}
                                    </span>
                                </div>
                                
                                <p class="text-muted small mb-2 text-truncate-3" style="line-height: 1.4;">
                                    ${e.description ? e.description : 'No description provided.'}
                                </p>

                                <div class="row g-2 text-muted mt-2 border-top pt-2" style="font-size: 0.75rem;">
                                    <div class="col-12 col-sm-4"><i class="bi bi-person me-1"></i>${e.presenter_name}</div>
                                    <div class="col-12 col-sm-5"><i class="bi bi-geo-alt me-1"></i>${e.place}</div>
                                    <div class="col-12 col-sm-3 text-sm-end">
                                        <button class="btn btn-sm btn-outline-primary border-0 py-0" 
                                            onclick="openEditModal(${e.id}, ${JSON.stringify(e.heading).replace(/"/g, '&quot;')}, ${JSON.stringify(e.presenter_name).replace(/"/g, '&quot;')}, '${e.date}', ${JSON.stringify(e.place).replace(/"/g, '&quot;')}, ${JSON.stringify(e.description || '').replace(/"/g, '&quot;')})">
                                            <i class="bi bi-pencil"></i>Edit
                                        </button>
                                        <button class="btn btn-sm btn-outline-danger border-0 py-0" onclick="deleteEvent(${e.id})"><i class="bi bi-trash"></i>Delete</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            list.appendChild(card);
        });
    } catch(err) {
        list.innerHTML = `<div class="alert alert-danger mx-3">Error loading events.</div>`;
    }
}

// ... rest of your JS functions (openEditModal, deleteEvent, updateEvent) ...
function openEditModal(id, heading, presenter, date, place, description){
    currentEditingEventId = id;
    document.getElementById("editHeading").value = heading;
    document.getElementById("editPresenter").value = presenter;
    document.getElementById("editDate").value = date;
    document.getElementById("editPlace").value = place;
    document.getElementById("editDescription").value = description;
    editModal.show();
}

async function deleteEvent(id) {
    if (confirm("Permanently delete this event?")) {
        try {
            const res = await fetch(`../backend/delete_event.php?id=${id}`);
            const data = await res.json();
            if (data.status === "success") loadEvents();
            else alert(data.message);
        } catch (err) { alert("Delete failed."); }
    }
}

async function updateEvent(){
    const updatedData = {
        id: currentEditingEventId,
        heading: document.getElementById("editHeading").value,
        presenter_name: document.getElementById("editPresenter").value,
        date: document.getElementById("editDate").value,
        place: document.getElementById("editPlace").value,
        description: document.getElementById("editDescription").value
    };

    try {
        const res = await fetch("../backend/update_event.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(updatedData)
        });
        const data = await res.json();
        if(data.status === "success") {
            editModal.hide();
            loadEvents();
        } else alert(data.message);
    } catch (err) { alert("Connection error."); }
}

document.addEventListener("DOMContentLoaded", () => {
    const user = JSON.parse(localStorage.getItem("user"));
    if (user && user.user_role === 'Admin') {
        document.getElementById("adminLink").style.display = "block";
    }
    loadEvents();
});
</script>
</body>
</html>
